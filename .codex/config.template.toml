# Portable Codex config template for frontend onboarding.
# Copy to ~/.codex/config.toml and customize trusted project paths per machine.

model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
personality = "pragmatic"

# Add your own trusted project paths (example):
# [projects."/absolute/path/to/your/project"]
# trust_level = "trusted"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.context7.env]
# Put CONTEXT7_API_KEY in your shell environment or replace this placeholder value.
CONTEXT7_API_KEY = "${CONTEXT7_API_KEY}"

[sandbox_workspace_write]
network_access = true

# Deferred integration:
# Pencil MCP intentionally not included by default pending source/provenance verification.
